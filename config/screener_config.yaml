# =============================================================
# Nifty100 Screener Configuration
# Analyst-editable threshold definitions
# =============================================================
#
# Each filter defines:
#   column:      DataFrame column name (must match financial_ratios schema)
#   display_name: Human-readable label for reports
#   direction:   "min" (keep >= threshold) or "max" (keep <= threshold)
#   default:     Default threshold value (None = no filter)
#   unit:        Display unit for UI/reporting
#
# Special behaviour:
#   debt_to_equity  - Auto-skips Financials sector when applied
#   interest_coverage_ratio - Debt-free companies treated as ICR = infinity
#
# =============================================================

filters:
  roe:
    column: "roe"
    display_name: "Return on Equity (%)"
    direction: "min"
    default: null
    unit: "%"

  debt_to_equity:
    column: "debt_to_equity"
    display_name: "Debt to Equity"
    direction: "max"
    default: null
    unit: "x"
    skip_sectors:
      - "Financials"
      - "FIN"
      - "NBFC"

  free_cash_flow:
    column: "free_cash_flow"
    display_name: "Free Cash Flow"
    direction: "min"
    default: null
    unit: "Cr"

  revenue_cagr_5yr:
    column: "revenue_cagr_5yr"
    display_name: "Revenue CAGR 5-Year (%)"
    direction: "min"
    default: null
    unit: "%"

  pat_cagr_5yr:
    column: "pat_cagr_5yr"
    display_name: "PAT CAGR 5-Year (%)"
    direction: "min"
    default: null
    unit: "%"

  operating_profit_margin:
    column: "operating_profit_margin"
    display_name: "Operating Profit Margin (%)"
    direction: "min"
    default: null
    unit: "%"

  pe_ratio:
    column: "pe_ratio"
    display_name: "Price to Earnings"
    direction: "max"
    default: null
    unit: "x"

  pb_ratio:
    column: "pb_ratio"
    display_name: "Price to Book"
    direction: "max"
    default: null
    unit: "x"

  dividend_yield:
    column: "dividend_yield"
    display_name: "Dividend Yield (%)"
    direction: "min"
    default: null
    unit: "%"

  interest_coverage_ratio:
    column: "interest_coverage_ratio"
    display_name: "Interest Coverage Ratio"
    direction: "min"
    default: null
    unit: "x"
    debt_free_passes: true

  market_cap:
    column: "market_cap"
    display_name: "Market Cap"
    direction: "min"
    default: null
    unit: "Cr"

  net_profit:
    column: "net_profit"
    display_name: "Net Profit"
    direction: "min"
    default: null
    unit: "Cr"

  eps_cagr_5yr:
    column: "eps_cagr_5yr"
    display_name: "EPS CAGR 5-Year (%)"
    direction: "min"
    default: null
    unit: "%"

  asset_turnover:
    column: "asset_turnover"
    display_name: "Asset Turnover"
    direction: "min"
    default: null
    unit: "x"

  net_sales:
    column: "net_sales"
    display_name: "Net Sales / Revenue"
    direction: "min"
    default: null
    unit: "Cr"

# =============================================================
# Preset screeners (Day 16 — defined here for analyst convenience)
# Each preset references filter names and overrides defaults
# =============================================================
presets:
  quality_compounder:
    display_name: "Quality Compounder"
    filters:
      roe: 15.0
      debt_to_equity: 1.0
      free_cash_flow: 0.0
      revenue_cagr_5yr: 10.0

  value_pick:
    display_name: "Value Pick"
    filters:
      pe_ratio: 20.0
      pb_ratio: 3.0
      debt_to_equity: 2.0
      dividend_yield: 1.0

  growth_accelerator:
    display_name: "Growth Accelerator"
    filters:
      pat_cagr_5yr: 20.0
      revenue_cagr_5yr: 15.0
      debt_to_equity: 2.0

  dividend_champion:
    display_name: "Dividend Champion"
    filters:
      dividend_yield: 2.0
      dividend_payout_ratio: 80.0
      free_cash_flow: 0.0

  debt_free_blue_chip:
    display_name: "Debt-Free Blue Chip"
    filters:
      debt_to_equity: 0.0
      roe: 12.0
      net_sales: 5000.0

  turnaround_watch:
    display_name: "Turnaround Watch"
    filters:
      revenue_cagr_5yr: 10.0
      free_cash_flow: 0.0

# =============================================================
# Sector aliases for D/E skip logic
# =============================================================
financial_sectors:
  - "Financials"
  - "FIN"
  - "NBFC"
  - "Banks"
  - "Insurance"
  - "AMC"
  - "Financial Services"
